name: Deploy to production

on:
  push:
    branches:
      - misha

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e  # остановка при ошибке

            cd /var/lib/uvicorn/ETL_4dk

            echo "📦 Pulling latest changes..."
            git fetch origin misha
            git reset --hard origin/misha

            echo "📦 Installing dependencies..."
            /var/lib/uvicorn/ETL_4dk/venv/bin/pip install -r requirements.txt

            echo "🔧 Fixing permissions..."
            chown -R uvicorn:uvicorn /var/lib/uvicorn/ETL_4dk

            echo "🚀 Restarting uvicorn service..."
            systemctl restart uvicorn

            echo "⏳ Waiting for service to start..."
            sleep 5

            # Health-check через curl
            echo "🔍 Checking API health..."
            if curl -s --max-time 5 http://localhost:8000/health | grep -q '"status":"ok"'; then
                echo "✅ API is healthy"
            else
                echo "❌ API health check failed!"
                exit 1
            fi

            # Собираем информацию о коммите
            COMMIT_HASH=$(git -C /var/lib/uvicorn/ETL_4dk rev-parse --short HEAD)
            COMMIT_MESSAGE=$(git -C /var/lib/uvicorn/ETL_4dk log -1 --pretty=%s)
            COMMIT_AUTHOR=$(git -C /var/lib/uvicorn/ETL_4dk log -1 --pretty=%an)
            DEPLOY_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

            # Пишем deployment.json
            cat > /var/www/db.vodalchuk.ru/deployment.json << JSONEOF
            {
                "branch": "dev",
                "commit": "${COMMIT_HASH}",
                "message": "${COMMIT_MESSAGE}",
                "author": "${COMMIT_AUTHOR}",
                "deployed_at": "${DEPLOY_TIME}"
            }
            JSONEOF

            # Проверяем, что uvicorn может прочитать
            chown uvicorn:uvicorn /var/www/db.vodalchuk.ru/deployment.json

            echo "✅ Deployment completed successfully!"
            echo "🌍 Visit: https://db.vodalchuk.ru"